<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}security-shift-intake{% endblock %}</title>
  <link rel="icon" href="data:,">
  <!-- Vendored locally (offline/local-first); SRI guards integrity. -->
  <script src="/static/htmx.min.js"
          integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq"
          crossorigin="anonymous"></script>
  <script src="/static/app.js" defer></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 1200px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    .must-review { background: #fff3cd; }
    .badge { padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .pending { background: #e2e3e5; }
    .approved { background: #d4edda; }
    .rejected { background: #f8d7da; }
    .ocr-good { background: #d4edda; }
    .ocr-low { background: #fff3cd; }
    .ocr-failed { background: #f8d7da; }
    pre { background: #f6f8fa; padding: 10px; white-space: pre-wrap; }
    button { padding: 6px 12px; margin-right: 6px; cursor: pointer; }
    /* Cockpit: page image (left) beside the review panels (right). Degrades to a
       single column when no page image was persisted (.cockpit without .has-page). */
    .cockpit.has-page { display: flex; gap: 1.5rem; align-items: flex-start; }
    .cockpit.has-page .page-pane { flex: 0 0 42%; position: sticky; top: 1rem; }
    .cockpit.has-page .review-pane { flex: 1 1 58%; min-width: 0; }
    .page-stage { position: relative; display: block; }
    .page-stage img { width: 100%; height: auto; display: block; border: 1px solid #ccc; }
    .bbox-highlight {
      position: absolute; border: 2px solid #d33; background: rgba(221, 51, 51, 0.18);
      box-sizing: border-box; pointer-events: none; transition: all 0.1s ease;
    }
    .evidence-note { font-size: 0.9em; color: #555; }
    tr[data-field] { cursor: pointer; }
    tr[data-field].active { outline: 2px solid #d33; }
    .evidence-cell { font-size: 0.85em; color: #555; white-space: nowrap; }
  </style>
</head>
<body>
  <h1><a href="/">security-shift-intake</a></h1>
  {% block content %}{% endblock %}
</body>
</html>
