name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: lint - typecheck - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (from uv.lock)
        run: uv sync --locked

      - name: Lint (ruff)
        run: make lint

      - name: Typecheck (mypy)
        run: make typecheck

      - name: Test (pytest)
        run: make test
