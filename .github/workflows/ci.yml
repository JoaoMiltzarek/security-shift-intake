name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: lint - typecheck - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (from uv.lock)
        run: uv sync --locked

      - name: Preflight (non-blocking env probe)
        continue-on-error: true
        run: python3 scripts/preflight.py --json | tee preflight.json

      - name: Lint (ruff)
        run: make lint

      - name: Typecheck (mypy)
        run: make typecheck

      - name: Test (pytest)
        run: set -o pipefail; make test 2>&1 | tee pytest.log

      - name: Validate configs (schema-for-the-schema)
        run: make validate-config

      - name: Privacy check (no real data / PII)
        run: set -o pipefail; make privacy-check 2>&1 | tee privacy.log

      - name: Evidence report (authoritative collector — uploaded, not committed)
        if: always()
        run: >
          uv run python scripts/evidence_report.py
          --preflight preflight.json --pytest-log pytest.log --privacy-log privacy.log
          --authoritative-sha ${{ github.sha }} --out SSI-1002_EVIDENCE.md

      - name: Upload evidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssi-1002-evidence
          path: SSI-1002_EVIDENCE.md

  smoke-eval:
    name: smoke-eval (metrics + report)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tesseract (OCR baseline)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (from uv.lock)
        run: uv sync --locked

      - name: Run eval on a tiny fixture
        run: PYTHONPATH=. uv run python -m evals.run_eval --classification-n 400 --transcription-n 2

      - name: Show generated report
        run: cat EVAL_REPORT.md

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: |
            metrics.json
            EVAL_REPORT.md

  browser-smoke:
    name: browser-smoke (cockpit UI gate — BLOCKING)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (from uv.lock)
        run: uv sync --locked

      - name: Install Playwright Chromium
        run: uv run --with playwright playwright install --with-deps chromium

      - name: Start the cockpit (controle_ocorrencias config)
        run: |
          mkdir -p private
          INTAKE_CONFIG=configs/controle_ocorrencias.yaml \
            uv run uvicorn src.api.app:app --host 127.0.0.1 --port 8000 &
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:8000/health && break; sleep 1; done

      - name: Browser-smoke (bbox / overlay / save / CSP violations)
        run: uv run --with playwright python scripts/browser_smoke.py

      - name: Upload cockpit screenshot (real page capture)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-screenshot
          path: samples/screenshot_review_overlay.png
