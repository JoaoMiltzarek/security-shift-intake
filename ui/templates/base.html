<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f1e8">
  <title>{% block title %}Security Shift Intake{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/app.css">
  <meta name="htmx-config"
        content='{"allowEval":false,"allowScriptTags":false,"historyEnabled":false,"includeIndicatorStyles":false}'>
  <script src="/static/htmx.min.js"
          integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq"
          crossorigin="anonymous" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <header class="site-header">
    <a class="brand" href="/" aria-label="Security Shift Intake — fila de revisão">
      <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true" focusable="false">
        <path d="M9 7.5h18.5L32 12v20.5H9z"/>
        <path d="M27.5 7.5V12H32M14 17h13M14 22h13M14 27h8"/>
        <circle cx="28.5" cy="27.5" r="5"/>
        <path d="m32 31 3 3"/>
      </svg>
      <span>
        <strong>Security Shift Intake</strong>
        <small>Mesa de evidências local</small>
      </span>
    </a>
    <span class="local-indicator"><span aria-hidden="true"></span> Somente neste computador</span>
  </header>

  <div id="app-notice" class="app-notice" role="status" aria-live="polite" tabindex="-1" hidden>
    <span id="app-notice-message"></span>
    <button id="app-notice-reload" class="button button-quiet button-compact" type="button" hidden>
      Recarregar revisão
    </button>
  </div>

  <main id="conteudo-principal" class="page-shell" tabindex="-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Revisão humana obrigatória · nenhum envio externo</p>
  </footer>
</body>
</html>
